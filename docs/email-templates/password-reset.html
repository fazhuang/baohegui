<!-- 密码重置邮件模板 — 从 hlgs email_service.py send_password_reset_email 提取并适配 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;padding:24px;background:#f0f2f6">
<div style="max-width:480px;margin:0 auto;background:#fff;padding:32px;border-radius:12px;border:1px solid #E4E6E9">
  <div style="font-size:24px;font-weight:600;color:#0B0D10;margin-bottom:16px">包合规</div>
  <h2 style="margin:0 0 8px;color:#0B0D10">密码重置</h2>
  <p style="color:#5B5F66;margin:0 0 16px">您收到此邮件是因为您（或他人）请求重置包合规账户密码。</p>
  <a href="{{ reset_url }}" style="display:inline-block;background:#3D5AFE;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;margin:16px 0">重置密码</a>
  <p style="font-size:13px;color:#8B8F95">链接 {{ expires_hours }} 小时内有效。如非本人操作请忽略。</p>
  <hr style="border:none;border-top:1px solid #E4E6E9;margin:24px 0">
  <p style="font-size:12px;color:#8B8F95">© 2026 包合规</p>
</div>
</body>
</html>
